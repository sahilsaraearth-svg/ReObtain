org.gradle.jvmargs=-Xmx1500m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m
org.gradle.java.home=/home/user/jdk21
android.useAndroidX=true
android.enableJetifier=true

# Fix SSL trust store for build environment
systemProp.javax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts
systemProp.javax.net.ssl.trustStorePassword=changeit
systemProp.javax.net.ssl.trustStoreType=PKCS12
